<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Presença - Jogo do Brasil! 🇧🇷⚽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f9f4; /* Fundo verde bem clarinho */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 151, 57, 0.15);
            border: 3px solid #fedd00; /* Borda amarela */
            max-width: 90%;
            width: 420px;
        }

        h1 {
            color: #009739; /* Verde Brasil */
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        p {
            color: #555;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* Estilização da caixa de texto do nome */
        .campo-nome {
            width: 100%;
            max-width: 250px;
            padding: 12px 15px;
            font-size: 1rem;
            border: 2px solid #009739; /* Borda Verde */
            border-radius: 10px;
            margin-bottom: 25px;
            outline: none;
            text-align: center;
            transition: border-color 0.2s ease;
        }

        .campo-nome:focus {
            border-color: #fedd00; /* Muda para amarelo ao clicar */
            box-shadow: 0 0 5px rgba(254, 221, 0, 0.5);
        }

        .buttons {
            display: flex;
            flex-direction: column; /* Organiza os botões em coluna */
            align-items: center; /* Centraliza os botões */
            gap: 15px; /* Espaço entre os botões */
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s ease;
            width: 100%; /* Botões ocupam a largura total do container */
            max-width: 200px; /* Largura máxima para não ficarem muito grandes */
        }

        #sim {
            background-color: #009739; /* Verde */
            color: white;
        }

        #sim:hover {
            transform: scale(1.1);
        }

        #nao {
            background-color: #002776; /* Azul Brasil */
            color: white;
            position: relative; /* Começa na posição normal */
            touch-action: none; /* Desativa ações de toque padrão para este elemento */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bora assistir ao jogo do Brasil aqui em casa hoje (24/06)? 🇧🇷⚽</h1>
        <p>Os petiscos e as bebidas já estão no esquema, só falta você confirmar! E aí, você vem?</p>
        
        <input type="text" id="nomeInput" class="campo-nome" placeholder="Digite seu nome">

        <div class="buttons">
            <button id="sim" onclick="aceitou()">BORA! 🍻</button>
            <button id="nao" onmouseover="fugir()" ontouchstart="fugirComToque(event)">NÃO! Irei secar o Brasil sozinho ❌</button>
        </div>
    </div>

    <script>
        function fugir() {
            const botaoNao = document.getElementById('nao');
            
            const larguraTela = window.innerWidth;
            const alturaTela = window.innerHeight;

            const novoX = Math.random() * (larguraTela - botaoNao.offsetWidth);
            const novoY = Math.random() * (alturaTela - botaoNao.offsetHeight);

            botaoNao.style.position = 'fixed';
            botaoNao.style.left = novoX + 'px';
            botaoNao.style.top = novoY + 'px';
        }

        function fugirComToque(event) {
            if (event.cancelable) {
                event.preventDefault();
            }
            fugir();
        }

        function aceitou() {
            // Pega o valor digitado e remove espaços em branco extras
            const nomeDigitado = document.getElementById('nomeInput').value.trim();
            let mensagemFinal = "";

            // Verifica se o usuário preencheu o nome
            if (nomeDigitado !== "") {
                mensagemFinal = `Aeeeee, ${nomeDigitado}! Presença confirmada! Te espero aqui em casa mais tarde. Traz o otimismo que hoje tem vitória! 🥳🇧🇷`;
            } else {
                mensagemFinal = "Aeeeee! Presença confirmada! Te espero aqui em casa mais tarde. Traz o otimismo que hoje tem vitória! 🥳🇧🇷";
            }
            
            alert(mensagemFinal);
            
            // Opcional: Se usar o redirecionamento do WhatsApp, você também pode passar o nome por lá:
            // const textoZap = nomeDigitado !== "" ? `Confirmado! Aqui é o ${nomeDigitado}, tô chegando aí mais tarde pro jogo! 🇧🇷⚽` : "Confirmado! Tô chegando aí mais tarde pro jogo! 🇧🇷⚽";
            // window.location.href = "https://wa.me/55DDDSEUNUMERO?text=" + encodeURIComponent(textoZap);
        }
    </script>

</body>
</html>
